# Nginx (reverse proxy) para servir MarkItDown GUI en un (sub)dominio.
#
# Instalación:
#   sudo cp deploy/nginx-md.tudominio.es.conf /etc/nginx/sites-available/md.tudominio.es
#   sudo ln -s /etc/nginx/sites-available/md.tudominio.es /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d md.tudominio.es   # añade el 443 + certificado + redirección
#
# Cambia "md.tudominio.es" por tu dominio si reutilizas este fichero.

server {
    server_name md.tudominio.es;

    # El límite por archivo de la app es 50 MB; deja margen para lotes.
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # markitdown no tiene timeout interno; sube el del proxy para PDFs grandes.
        proxy_read_timeout 300s;

        # La app NO tiene autenticación: protégela si la expones en público.
        #   sudo apt-get install -y apache2-utils
        #   sudo htpasswd -c /etc/nginx/.htpasswd tu_usuario
        # y descomenta:
        # auth_basic "Acceso restringido";
        # auth_basic_user_file /etc/nginx/.htpasswd;
    }
}
