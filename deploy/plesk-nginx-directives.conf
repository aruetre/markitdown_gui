# Directivas adicionales de nginx para Plesk (IONOS).
# ---------------------------------------------------------------------------
# NO copies esto a /etc/nginx: en Plesk se pega en el PANEL.
#
#   Plesk → Dominios → md.tudominio.es → "Configuración de Apache y nginx"
#     1. DESMARCA  "Modo proxy" (Proxy mode)
#     2. DESMARCA  "Procesamiento inteligente de archivos estáticos"
#     3. Pega TODO lo de abajo en "Directivas adicionales de nginx"
#     4. Aplicar  →  comprueba con:  nginx -t
#
# Desmarcar "Modo proxy" evita el error "duplicate location /": cuando está
# activo, Plesk ya genera su propio  location /  que reenvía a Apache, y chocaría
# con el de abajo.
#
# Si usaste otro puerto al instalar (PORT=...), cámbialo aquí también.
# ---------------------------------------------------------------------------

# El límite por archivo de la app es 50 MB; deja margen para lotes.
client_max_body_size 100M;

location / {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # markitdown no tiene timeout interno; sube el del proxy para PDFs grandes.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # La app NO tiene autenticación. Para protegerla con usuario/contraseña:
    #   1) por SSH:  htpasswd -c /var/www/vhosts/tudominio.es/.htpasswd tu_usuario
    #   2) descomenta las 2 líneas siguientes:
    # auth_basic "Acceso restringido";
    # auth_basic_user_file /var/www/vhosts/tudominio.es/.htpasswd;
}
