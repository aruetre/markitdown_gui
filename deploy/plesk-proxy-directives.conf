# ───────────────────────────────────────────────────────────────────────────
# AUTENTICACIÓN (opcional, recomendado) — la app NO trae ninguna.
#   Por SSH:  htpasswd -c /var/www/vhosts/tudominio.es/.htpasswd tu_usuario
#   Apache  → añade dentro del mismo campo:
#       <Location />
#           AuthType Basic
#           AuthName "Acceso restringido"
#           AuthUserFile /var/www/vhosts/tudominio.es/.htpasswd
#           Require valid-user
#       </Location>
#   nginx   → dentro del location /:
#       auth_basic "Acceso restringido";
#       auth_basic_user_file /var/www/vhosts/tudominio.es/.htpasswd;
# ───────────────────────────────────────────────────────────────────────────
