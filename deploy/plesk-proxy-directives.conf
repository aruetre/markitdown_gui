# Proxy inverso para MarkItDown GUI en Plesk (IONOS).
# ===========================================================================
# La app corre como servicio en 127.0.0.1:8000 y Plesk hace de proxy delante.
# Estas directivas se pegan EN EL PANEL de Plesk, no en /etc/nginx ni /etc/apache2.
#
#   Plesk → Dominios → md.tudominio.es → "Configuración de Apache y nginx"
#
# Según lo que ese panel te ofrezca, usa UNA de las dos variantes de abajo.
# Si usaste otro puerto al instalar (PORT=...), cámbialo también aquí.
# ===========================================================================


# ───────────────────────────────────────────────────────────────────────────
# VARIANTE A — APACHE  (úsala si el panel SOLO muestra campos de Apache,
# sin "Modo proxy" ni "Directivas adicionales de nginx" — caso típico en
# IONOS cuando nginx no está expuesto por dominio).
#
#   Pega esto en AMBOS campos:
#     "Additional directives for HTTP"  y  "Additional directives for HTTPS"
#   Aplicar → OK.
#
#   Si Apache rechaza ProxyPass, falta el módulo. Por SSH:
#     a2enmod proxy proxy_http && systemctl reload apache2
# ───────────────────────────────────────────────────────────────────────────

ProxyPreserveHost On
ProxyPass / http://127.0.0.1:8000/ timeout=300
ProxyPassReverse / http://127.0.0.1:8000/
LimitRequestBody 104857600


# ───────────────────────────────────────────────────────────────────────────
# VARIANTE B — NGINX  (úsala si el panel muestra "Modo proxy" y
# "Directivas adicionales de nginx").
#
#   1. DESMARCA "Modo proxy" (Proxy mode)        ← evita "duplicate location /"
#   2. DESMARCA "Procesamiento inteligente de archivos estáticos"
#   3. Pega el bloque de abajo en "Directivas adicionales de nginx"
#   4. Aplicar → comprueba con:  nginx -t
# ───────────────────────────────────────────────────────────────────────────

